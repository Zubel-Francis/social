<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
</head>
<body>
    <div class="container">
        <div class="avatar">
            <img src="assets/images/avatar-jessica.jpeg" alt="avatar-jessica">
        </div>
        <div class="details">
            <div class="head">
                <h2>Jessica Randall</h2>
            </div>
            <div class="location">
                <h4>London, United Kingdom</h4>
            </div>
            <div class="para">
                <p>"Front-end developer and avid reader."</p>
            </div>
        </div>
        <div class="buttons">
            <ul>
                <li class="level"> <button>GitHub</button></li>
                <li class="level"><button>Frontend Mentor</button></li>
                <li class="level"><button>Linkedin</button></li>
                <li class="level"><button>Twitter</button></li>
                <li class="level"><button>Instagram</button></li>
            </ul>
        </div>
    </div>
</body>
</html>
